name: Deploy to GitHub Pages

on:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: write
  pages: write
  id-token: write

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      
      - name: Generate config for GitHub Pages
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_KEY: ${{ secrets.SUPABASE_KEY }}
          ADMIN_EMAIL: ${{ secrets.ADMIN_EMAIL }}
          API_BAZI_URL: ${{ secrets.API_BAZI_URL }}
        run: |
          echo '// Generated by GitHub Actions, do not edit manually' > config.gh-pages.js
          echo "window.__GH_PAGES_CONFIG = {" >> config.gh-pages.js
          echo "  supabase_url: '${SUPABASE_URL}'," >> config.gh-pages.js
          echo "  supabase_key: '${SUPABASE_KEY}'," >> config.gh-pages.js
          echo "  admin_email: '${ADMIN_EMAIL}'," >> config.gh-pages.js
          echo "  api_bazi_url: '${API_BAZI_URL}'" >> config.gh-pages.js
          echo "};" >> config.gh-pages.js
      
      - name: Deploy to GitHub Pages
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: .