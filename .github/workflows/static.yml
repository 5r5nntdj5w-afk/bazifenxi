name: Deploy to GitHub Pages

on:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: write

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          persist-credentials: false
      
      - name: Configure Git
        run: |
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          git config --global user.name "github-actions[bot]"
      
      - name: Replace secrets
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_KEY: ${{ secrets.SUPABASE_KEY }}
          ADMIN_EMAIL: ${{ secrets.ADMIN_EMAIL }}
        run: |
          sed -i "s/%SUPABASE_URL%/$SUPABASE_URL/g" index.html
          sed -i "s/%SUPABASE_KEY%/$SUPABASE_KEY/g" index.html
          sed -i "s/%ADMIN_EMAIL%/$ADMIN_EMAIL/g" index.html
      
      - name: Commit and push
        run: |
          git add index.html
          git commit -m "Deploy with secrets injected"
          git push https://${{ secrets.GITHUB_TOKEN }}@github.com/${{ github.repository }}.git main